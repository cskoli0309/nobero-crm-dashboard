.ch-filters{display:flex;gap:6px;flex-wrap:wrap}

.ch-btn:hover{background:#f3f4f6}
.ch-btn.active{background:#2563eb;color:#fff;border-color:#2563eb}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{background:#f9fafb;color:#6b7280;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;padding:9px 11px;text-align:right;border-bottom:2px solid #e5e7eb;white-space:nowrap;position:sticky;top:0;z-index:1}
thead th:first-child,thead th:nth-child(2),thead th:nth-child(3){text-align:left}
tbody td{padding:9px 11px;border-bottom:1px solid #f3f4f6;color:#374151;text-align:right;white-space:nowrap;vertical-align:middle}
tbody td:first-child{text-align:left;max-width:260px;overflow:hidden;text-overflow:ellipsis;font-weight:500;color:#111}
tbody td:nth-child(2){text-align:left}
tbody td:nth-child(3){text-align:left;color:#6b7280;font-size:12px}
tbody tr:hover td{background:#f9fafb}
tbody tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11.5px;font-weight:600}
.bg{background:#dcfce7;color:#166534}
.by{background:#fef9c3;color:#854d0e}

// ─── DAY AGGREGATES ──────────────────────────────────────────────────────────
const DAY = {};
CAMPS.forEach(c => {
  if (!DAY[c.date]) DAY[c.date] = {rev:0, spend:0, count:0};
  DAY[c.date].rev   += c.revenue;
  DAY[c.date].spend += c.spend;
  DAY[c.date].count++;
});

const CH_TAGS = {'Email':'ch-email','WhatsApp':'ch-whatsapp','SMS':'ch-sms','AppPush':'ch-apppush','WebPush':'ch-webpush'};
const CH_ORDER = ['WhatsApp','SMS','Email','AppPush','WebPush'];

function fINR(v) { return '&#8377;' + v.toLocaleString('en-IN', {maximumFractionDigits:0}); }
function fmtPct(v) { return v != null ? v + '%' : '<span class="muted">—</span>'; }
function roasBadge(r) {
  if (r === null || r === undefined) return '<span class="muted">—</span>';
  const cls = r >= 3 ? 'bg' : r >= 1 ? 'by' : 'br';
  return '<span class="badge ' + cls + '">' + r.toFixed(1) + 'x</span>';
}

// Build day grid
(function() {
  const sorted = Object.keys(DAY).sort();
  const grid = document.getElementById('day-grid');
  grid.innerHTML = sorted.map(d => {
    const info = DAY[d];
    const roas = info.spend > 0 ? info.rev / info.spend : null;
    const dt = new Date(d + 'T00:00:00');
    const label = dt.toLocaleDateString('en-IN', {day:'numeric', month:'short'});
    let roasHtml = '';
    if (roas === null) roasHtml = '<div class="day-roas" style="color:#9ca3af">Free channels</div>';
    else {
      const col = roas >= 3 ? '#166534' : roas >= 1 ? '#854d0e' : '#991b1b';
      roasHtml = '<div class="day-roas" style="color:' + col + '">ROAS ' + roas.toFixed(1) + 'x</div>';
    }
    return '<div class="day-card" onclick="showDay('' + d + '',this)">'
      + '<div class="day-date">' + label + '</div>'
      + '<div class="day-rev">' + fINR(info.rev) + '</div>'
      + '<div class="day-meta">' + info.count + ' campaigns</div>'
      + roasHtml + '</div>';
  }).join('');
})();

let activeDayEl = null;
let activeDayDate = null;
let chFilter = 'All';

function showDay(d, el) {
  if (activeDayEl) activeDayEl.classList.remove('active');
  el.classList.add('active');
  activeDayEl = el;
  activeDayDate = d;
  chFilter = 'All';

  const camps = CAMPS.filter(c => c.date === d);
  const channels = [...new Set(camps.map(c => c.channel))].sort((a,b) => CH_ORDER.indexOf(a) - CH_ORDER.indexOf(b));

  // Channel filters
  const filters = document.getElementById('ch-filters');
  filters.innerHTML = '<button class="ch-btn active" onclick="filterCh('All',this)">All</button>'
    + channels.map(ch => '<button class="ch-btn" onclick="filterCh('' + ch + '',this)">' + ch + '</button>').join('');

  // Title + stats
  const dt = new Date(d + 'T00:00:00');
  document.getElementById('detail-title').textContent = dt.toLocaleDateString('en-IN', {day:'numeric',month:'long',year:'numeric'});
  const info = DAY[d];
  const roasStr = info.spend > 0 ? (info.rev/info.spend).toFixed(1) + 'x' : 'Free';
  document.getElementById('detail-stats').innerHTML =
    '<span class="stat-chip"><b>' + fINR(info.rev) + '</b> revenue</span>' +
    '<span class="stat-chip"><b>' + fINR(info.spend) + '</b> spend</span>' +
    '<span class="stat-chip"><b>' + roasStr + '</b> ROAS</span>' +
    '<span class="stat-chip"><b>' + info.count + '</b> campaigns</span>';

  document.getElementById('detail-section').style.display = '';
  renderTable(camps);
}

function filterCh(ch, el) {
  chFilter = ch;
  document.querySelectorAll('#ch-filters .ch-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (activeDayDate) renderTable(CAMPS.filter(c => c.date === activeDayDate));
}

function renderTable(allCamps) {
  const camps = chFilter === 'All' ? allCamps : allCamps.filter(c => c.channel === chFilter);
  camps.sort((a, b) => {
    const ai = CH_ORDER.indexOf(a.channel), bi = CH_ORDER.indexOf(b.channel);
    return ai !== bi ? ai - bi : b.revenue - a.revenue;
  });
  const tbody = document.getElementById('camp-body');
  if (!camps.length) {
    tbody.innerHTML = '<tr><td colspan="13" style="text-align:center;color:#9ca3af;padding:24px">No campaigns</td></tr>';
    return;
  }
  const spendCell = c => c.spend > 0 ? fINR(c.spend) : '<span class="muted">—</span>';
  tbody.innerHTML = camps.map(c => '<tr>'
    + '<td title="' + c.name + '">' + c.name + '</td>'
    + '<td><span class="ch-tag ' + (CH_TAGS[c.channel]||'') + '">' + c.channel + '</span></td>'
    + '<td>' + (c.sent_time || '—') + '</td>'
    + '<td>' + c.sent.toLocaleString('en-IN') + '</td>'
    + '<td>' + c.delivered.toLocaleString('en-IN') + '</td>'
    + '<td>' + c.del_rate + '%</td>'
    + '<td>' + fmtPct(c.open_rate) + '</td>'
    + '<td>' + c.ctr + '%</td>'
    + '<td>' + fmtPct(c.read_rate) + '</td>'
    + '<td>' + c.clicks.toLocaleString('en-IN') + '</td>'
    + '<td>' + spendCell(c) + '</td>'
    + '<td>' + fINR(c.revenue) + '</td>'
    + '<td>' + roasBadge(c.roas) + '</td>'
    + '</tr>').join('');
}
